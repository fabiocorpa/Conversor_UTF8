name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build
      run: |
        pyinstaller --onefile --windowed conversor_utf8_gui.py --name Conversor_UTF8

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Conversor_UTF8
        path: dist/Conversor_UTF8.exe
